<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đăng nhập</title>
  <link rel="stylesheet" href="../CSS/style.css" />
  <link rel="stylesheet" href="../CSS/auth.css" />
</head>
<body>
  <header class="auth-header">
    <div class="container auth-header__inner">
      <a class="logo auth-logo" href="../index.html">Pickleball 1982</a>
      <a class="button button--secondary auth-header__action" href="register.html">Tạo tài khoản mới</a>
    </div>
  </header>

  <main class="auth-page">
    <section class="auth-card card">
      <div class="auth-card__top">
        <div class="auth-card__icon">P</div>
        <h1>Đăng nhập</h1>
        <p>Đăng nhập để đặt sân và quản lý lịch của bạn.</p>
      </div>

      <div class="auth-card__body">
        <form id="loginForm">
          <div class="form-grid">
            <label class="full-width">
              <span>Số điện thoại / Email</span>
              <input type="email" id="loginEmail" placeholder="0912 345 678" required />
            </label>
            <label class="full-width">
              <span>Mật khẩu</span>
              <input type="password" id="loginPassword" placeholder="Nhập mật khẩu" required />
            </label>
            <div class="form-actions full-width">
              <button class="button button--primary full-width" type="submit">Đăng nhập</button>
              <a class="forgot-link" href="#">Quên mật khẩu?</a>
            </div>
            <p id="loginMessage" class="form-message"></p>
          </div>
        </form>
        <p class="auth-help">Chưa có tài khoản? <a href="register.html">Đăng ký ngay</a></p>
      </div>
    </section>
  </main>

  <script src="../JS/main.js"></script>
</body>
</html>
