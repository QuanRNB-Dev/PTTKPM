<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đăng nhập</title>
  <link rel="stylesheet" href="../CSS/style.css" />
  <link rel="stylesheet" href="../CSS/auth.css" />
</head>
<body>
  <main class="auth-page">
    <section class="auth-panel auth-panel--brand">
      <div class="brand-logo">PickleBall</div>
      <p>Đăng nhập để tiếp tục đặt sân và quản lý lịch.</p>
    </section>
    <section class="auth-panel auth-panel--form">
      <h1>Đăng nhập</h1>
      <p>Tiếp tục với thông tin đăng ký của bạn.</p>
      <form id="loginForm">
        <label>Email<input type="email" id="loginEmail" placeholder="example@gmail.com" required /></label>
        <label>Mật khẩu<input type="password" id="loginPassword" placeholder="Nhập mật khẩu" required /></label>
        <button class="button button--primary" type="submit">Đăng nhập</button>
        <p id="loginMessage" class="form-message"></p>
      </form>
      <div class="social-login">
        <button class="button button--secondary">Google</button>
        <button class="button button--secondary">Facebook</button>
      </div>
      <p class="auth-help">Chưa có tài khoản? <a href="register.html">Đăng ký</a></p>
    </section>
  </main>
  <script src="../JS/main.js"></script>
</body>
</html>
