<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hồ sơ cá nhân</title>
  <link rel="stylesheet" href="../CSS/style.css" />
  <link rel="stylesheet" href="../CSS/profile.css" />
</head>
<body>
  <div class="profile-shell">
    <header class="profile-header">
      <div>
        <p class="page-tag">12. Hồ sơ cá nhân</p>
        <h1>Hồ sơ của bạn</h1>
      </div>
      <a class="button button--secondary" href="../index.html">Về trang chủ</a>
    </header>
    <section class="profile-card">
      <div class="profile-avatar">A</div>
      <div>
        <h2 id="profileName">Nguyễn Văn A</h2>
        <p id="profileEmail">example@gmail.com</p>
      </div>
    </section>
    <section class="profile-info">
      <div class="info-row"><span>Họ và tên</span><span id="detailName">-</span></div>
      <div class="info-row"><span>Email</span><span id="detailEmail">-</span></div>
      <div class="info-row"><span>Điện thoại</span><span id="detailPhone">-</span></div>
      <div class="info-row"><span>Ngày đăng ký</span><span>15/04/2024</span></div>
      <div style="display:flex;gap:16px;flex-wrap:wrap;">
        <a class="button button--primary" href="booking-history.html">Xem lịch đã đặt</a>
        <button id="logoutButton" class="button button--secondary" type="button">Đăng xuất</button>
      </div>
    </section>
  </div>
  <script src="../JS/main.js"></script>
</body>
</html>
