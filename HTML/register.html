<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đăng ký tài khoản</title>
  <link rel="stylesheet" href="../CSS/style.css" />
  <link rel="stylesheet" href="../CSS/auth.css" />
</head>
<body>
  <main class="auth-page">
    <section class="auth-panel auth-panel--brand">
      <div class="brand-logo">PickleBall</div>
      <p>Đặt sân Pickleball dễ dàng, nhanh chóng và an toàn.</p>
    </section>
    <section class="auth-panel auth-panel--form">
      <h1>Đăng ký tài khoản</h1>
      <p>Nhập thông tin cá nhân để bắt đầu đặt sân.</p>
      <form id="registerForm">
        <label>Họ và tên<input type="text" id="fullName" placeholder="Nguyễn Văn A" required /></label>
        <label>Email<input type="email" id="email" placeholder="example@gmail.com" required /></label>
        <label>Số điện thoại<input type="tel" id="phone" placeholder="0123 456 789" required /></label>
        <label>Mật khẩu<input type="password" id="password" placeholder="Tối thiểu 6 ký tự" minlength="6" required /></label>
        <label class="checkbox-label"><input type="checkbox" id="agreeTerms" required /> Tôi đồng ý với <a href="#">Điều khoản</a> và <a href="#">Chính sách bảo mật</a>.</label>
        <button class="button button--primary" type="submit">Đăng ký</button>
      </form>
      <p class="auth-help">Đã có tài khoản? <a href="login.html">Đăng nhập</a></p>
    </section>
  </main>
  <script src="../JS/main.js"></script>
</body>
</html>
