<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lịch đã đặt</title>
  <link rel="stylesheet" href="../CSS/style.css" />
  <link rel="stylesheet" href="../CSS/booking.css" />
</head>
<body>
  <header class="booking-topbar">
    <div class="container topbar-inner">
      <a class="topbar-back" href="courts.html">← Lịch đặt</a>
      <a class="logo topbar-logo" href="../index.html">Pickleball 1982</a>
    </div>
  </header>

  <main class="history-page">
    <div class="history-shell">
      <section class="history-header-card">
        <div>
          <p class="page-tag">Lịch đặt của tôi</p>
          <h1>Lịch đặt sân của bạn</h1>
        </div>
        <div class="history-tabs" role="tablist">
          <button class="history-tab active" data-filter="all">Tất cả</button>
          <button class="history-tab" data-filter="upcoming">Sắp tới</button>
          <button class="history-tab" data-filter="past">Đã qua</button>
        </div>
      </section>

      <section id="historyList" class="history-list"></section>
    </div>
  </main>

  <script src="../JS/main.js"></script>
  <script src="../JS/booking.js"></script>
</body>
</html>
