<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quản lý lịch sân (Admin)</title>
  <link rel="stylesheet" href="../CSS/style.css" />
  <link rel="stylesheet" href="../CSS/admin.css" />
</head>
<body>
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <div class="brand">PickleBall Admin</div>
      <nav>
        <a href="admin-schedule.html" class="active">Quản lý lịch</a>
        <a href="admin-revenue.html">Thống kê doanh thu</a>
        <a href="admin-customers.html">Quản lý khách hàng</a>
        <a href="admin-services.html">Dịch vụ sân</a>
        <a href="../index.html">Về trang chủ</a>
      </nav>
    </aside>
    <main class="admin-main">
      <header class="admin-header">
        <div>
          <p class="page-tag">9. Quản lý lịch sân (Admin)</p>
          <h1>Quản lý lịch đặt sân</h1>
        </div>
      </header>
      <section class="schedule-board">
        <div class="schedule-toolbar">
          <div class="schedule-tabs" id="scheduleTabs"></div>
          <button class="button button--primary" id="addSlot">+ Thêm khung giờ</button>
        </div>
        <div class="schedule-grid-shell">
          <aside class="schedule-sidebar">
            <div class="sidebar-card">
              <p class="sidebar-title">Lọc và chú thích</p>
              <div class="field-group">
                <label>Chọn ngày</label>
                <select id="scheduleFilter"><option value="all">Tất cả</option><option value="today">Hôm nay</option><option value="week">Tuần này</option></select>
              </div>
              <div class="field-group">
                <label>Chọn sân</label>
                <select id="courtFilter"><option value="all">Tất cả sân</option><option value="Sân A1">Sân A1</option><option value="Sân A2">Sân A2</option><option value="Sân B1">Sân B1</option><option value="Sân B2">Sân B2</option></select>
              </div>
              <div class="field-group">
                <label>Trạng thái đặt sân</label>
                <select id="statusFilter"><option value="all">Tất cả</option><option value="pending">Chờ xác nhận</option><option value="confirmed">Đã xác nhận</option><option value="cancelled">Đã huỷ</option></select>
              </div>
              <div class="field-group status-summary-card">
                <div class="status-summary-row"><strong id="pendingCount">0</strong><span>Yêu cầu chờ</span></div>
              </div>
              <div class="legend-card">
                <p class="legend-title">Chú thích</p>
                <div class="legend-row"><span class="legend-dot legend-dot--green"></span><span>Đã xác nhận</span></div>
                <div class="legend-row"><span class="legend-dot legend-dot--orange"></span><span>Chờ xác nhận</span></div>
                <div class="legend-row"><span class="legend-dot legend-dot--red"></span><span>Đã huỷ</span></div>
                <div class="legend-row"><span class="legend-dot legend-dot--gray"></span><span>Còn trống</span></div>
              </div>
            </div>
          </aside>
          <div id="scheduleList" class="schedule-grid"></div>
        </div>
      </section>
    </main>
  </div>
  <script src="../JS/admin.js"></script>
</body>
</html>
