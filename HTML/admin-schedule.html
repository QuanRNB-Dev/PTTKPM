<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quản lý lịch sân (Admin)</title>
  <link rel="stylesheet" href="../CSS/style.css" />
  <link rel="stylesheet" href="../CSS/admin.css" />
</head>
<body>
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <div class="brand">PickleBall Admin</div>
      <nav>
        <a href="admin-schedule.html" class="active">Quản lý lịch</a>
        <a href="admin-revenue.html">Thống kê doanh thu</a>
        <a href="admin-customers.html">Quản lý khách hàng</a>
        <a href="admin-services.html">Dịch vụ sân</a>
        <a href="../index.html">Về trang chủ</a>
      </nav>
    </aside>
    <main class="admin-main">
      <header class="admin-header">
        <div>
          <p class="page-tag">9. Quản lý lịch sân (Admin)</p>
          <h1>Quản lý lịch đặt sân</h1>
        </div>
      </header>
      <section class="schedule-board">
        <div class="schedule-top">
          <div>
            <label>Chọn tuần</label>
            <select id="scheduleFilter"><option value="all">Tất cả</option><option value="today">Hôm nay</option><option value="week">Tuần này</option></select>
          </div>
          <div class="metric-card">
            <span>Đơn đặt</span>
            <strong id="pendingCount">0</strong>
          </div>
        </div>
        <div id="scheduleList" class="schedule-list"></div>
      </section>
    </main>
  </div>
  <script src="../JS/admin.js"></script>
</body>
</html>
